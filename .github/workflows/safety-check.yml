name: Safety & Quality Gate

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sepolicy-lint:
    name: "🔒 SELinux Policy Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check sepolicy semicolons
        run: |
          echo "=== Checking sepolicy.rule for missing semicolons ==="
          ERRORS=0
          while IFS= read -r line; do
            LINE_NUM=$((LINE_NUM + 1))
            # Skip empty lines, comments, type declarations
            trimmed=$(echo "$line" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
            [ -z "$trimmed" ] && continue
            [[ "$trimmed" == \#* ]] && continue
            [[ "$trimmed" == type\ * ]] && continue

            # allow/dontaudit/neverallow/auditallow statements must end with ;
            if echo "$trimmed" | grep -qE '^(allow|dontaudit|neverallow|auditallow) '; then
              # Strip trailing inline comments (e.g. "allow ... { exec }; # comment")
              statement=$(echo "$trimmed" | sed 's/#.*//' | sed 's/[[:space:]]*$//')
              if [[ "$statement" != *";" ]]; then
                echo "::error file=module/template/sepolicy.rule,line=$LINE_NUM::Missing semicolon: $trimmed"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done < module/template/sepolicy.rule

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS sepolicy statement(s) missing semicolons! This WILL break policy compilation on device."
            exit 1
          fi
          echo "✅ All sepolicy statements properly terminated"

  security-scan:
    name: "🛡️ Security Pattern Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for insecure PRNG usage in crypto contexts
        run: |
          echo "=== Scanning for java.util.Random in crypto contexts ==="
          ERRORS=0

          # Check Kotlin/Java files for java.util.Random used near crypto/key/hmac/secret
          FILES=$(grep -rl "java\.util\.Random" --include="*.kt" --include="*.java" service/ module/ 2>/dev/null || true)
          for f in $FILES; do
            LINES=$(grep -n "java\.util\.Random" "$f" | grep -iv "test" || true)
            if [ -n "$LINES" ]; then
              while IFS= read -r match; do
                LINE_NUM=$(echo "$match" | cut -d: -f1)
                echo "::error file=$f,line=$LINE_NUM::Insecure java.util.Random found in production code. Use java.security.SecureRandom for key material."
                ERRORS=$((ERRORS + 1))
              done <<< "$LINES"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS insecure PRNG usage(s) found in production code!"
            exit 1
          fi
          echo "✅ No insecure PRNG usage in production code"

      - name: Check for unwrap/expect in Rust FFI boundary
        run: |
          echo "=== Scanning for unwrap()/expect() in extern C functions ==="
          ERRORS=0

          # Extract extern "C" function blocks and check for unwrap/expect
          for f in $(find rust/ -name "*.rs" ! -path "*/test*"); do
            # Check if file has extern "C" functions
            if grep -q 'extern "C"' "$f" 2>/dev/null; then
              # Look for unwrap/expect NOT inside #[cfg(test)]
              # Simple heuristic: grep for unwrap/expect and filter out test blocks
              MATCHES=$(awk '
                /^#\[cfg\(test\)\]/ { in_test=1 }
                /^mod tests/ { in_test=1 }
                in_test && /^}$/ { in_test=0 }
                !in_test && /\.(unwrap|expect)\(/ { print NR": "$0 }
              ' "$f" 2>/dev/null || true)

              if [ -n "$MATCHES" ]; then
                while IFS= read -r match; do
                  LINE_NUM=$(echo "$match" | cut -d: -f1)
                  echo "::warning file=$f,line=$LINE_NUM::unwrap()/expect() found near FFI boundary. Ensure it's inside catch_unwind."
                done <<< "$MATCHES"
              fi
            fi
          done

          echo "✅ FFI panic safety check complete"

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for potential hardcoded secrets ==="
          # Check for suspicious patterns (exclude test files and comments)
          PATTERNS='(password|secret|api_key|token)\s*=\s*"[^"]{8,}"'
          MATCHES=$(grep -rniE "$PATTERNS" --include="*.kt" --include="*.java" --include="*.rs" \
            service/src/main/ module/src/main/ rust/cbor-cose/src/ 2>/dev/null \
            | grep -v "test" | grep -v "Test" | grep -v "codeql" | grep -v "//" || true)

          if [ -n "$MATCHES" ]; then
            echo "::warning::Potential hardcoded secrets found (review manually):"
            echo "$MATCHES"
          fi
          echo "✅ Secret scan complete"

  performance-check:
    name: "⚡ Performance Pattern Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check C++ for uncached repeated syscalls
        run: |
          echo "=== Checking for performance anti-patterns ==="

          # Check that is_binder_fd caches both positive AND negative results
          if grep -q 'if (is_binder)' module/src/main/cpp/binder_interceptor.cpp 2>/dev/null; then
            # If there's a conditional cache (only caching true), flag it
            if ! grep -q 'g_binder_fds\[fd\] = is_binder' module/src/main/cpp/binder_interceptor.cpp 2>/dev/null; then
              echo "::warning file=module/src/main/cpp/binder_interceptor.cpp::is_binder_fd may not cache negative results (performance issue)"
            fi
          fi

          echo "✅ Performance pattern check complete"

      - name: Check for Thread.sleep in main loops
        run: |
          echo "=== Checking for busy-wait patterns ==="
          # Low sleep values in main loops can drain battery
          MATCHES=$(grep -rn 'Thread\.sleep\s*(\s*[0-9]\{1,2\}\s*)' --include="*.kt" --include="*.java" \
            service/src/main/ 2>/dev/null | grep -v "test" | grep -v "Test" || true)

          if [ -n "$MATCHES" ]; then
            echo "::warning::Very short Thread.sleep values found (potential battery drain):"
            echo "$MATCHES"
          fi
          echo "✅ Busy-wait check complete"

  real-world-validation:
    name: "📱 Real-World Scenario Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate module structure for Magisk/KernelSU
        run: |
          echo "=== Validating module template structure ==="
          ERRORS=0

          # Required files for Magisk module
          for f in module.prop customize.sh service.sh post-fs-data.sh sepolicy.rule; do
            if [ ! -f "module/template/$f" ]; then
              echo "::error::Missing required module file: module/template/$f"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Validate module.prop has required fields
          if [ -f "module/template/module.prop" ]; then
            for field in id name version versionCode author description; do
              if ! grep -q "^${field}=" "module/template/module.prop"; then
                echo "::error file=module/template/module.prop::Missing required field: $field"
                ERRORS=$((ERRORS + 1))
              fi
            done
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Module structure validation failed!"
            exit 1
          fi
          echo "✅ Module structure valid for Magisk/KernelSU"

      - name: Validate shell script syntax
        run: |
          echo "=== Checking shell scripts for syntax errors ==="
          ERRORS=0

          for script in module/template/customize.sh module/template/service.sh module/template/post-fs-data.sh; do
            if [ -f "$script" ]; then
              if ! bash -n "$script" 2>/dev/null; then
                echo "::error file=$script::Shell syntax error detected"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
          echo "✅ All shell scripts pass syntax check"

      - name: Validate Rust static libraries exist
        run: |
          echo "=== Checking pre-built Rust libraries ==="
          ABIS="arm64-v8a armeabi-v7a x86 x86_64"
          ERRORS=0

          for abi in $ABIS; do
            LIB="module/src/main/cpp/external/rust_libs/$abi/libcbor_cose.a"
            if [ ! -f "$LIB" ]; then
              echo "::warning file=$LIB::Missing pre-built Rust library for $abi"
            else
              SIZE=$(stat -c%s "$LIB" 2>/dev/null || stat -f%z "$LIB" 2>/dev/null)
              if [ "$SIZE" -lt 1000 ]; then
                echo "::error file=$LIB::Rust library suspiciously small ($SIZE bytes). May be corrupted."
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
          echo "✅ Rust library validation complete"

      - name: Check Binder transaction code consistency
        run: |
          echo "=== Checking C++/Kotlin Binder transaction code consistency ==="
          # Extract transaction codes from C++ and Kotlin to ensure they match
          CPP_PROP_CODE=$(grep -oP 'REGISTER_PROPERTY_SERVICE\s*=\s*\K\d+' module/src/main/cpp/binder_interceptor.cpp 2>/dev/null || echo "not_found")
          KT_PROP_CODE=$(grep -oP 'REGISTER_PROPERTY_SERVICE_TRANSACTION_CODE\s*=\s*\K\d+' service/src/main/java/cleveres/tricky/cleverestech/binder/BinderInterceptor.kt 2>/dev/null || echo "not_found")

          if [ "$CPP_PROP_CODE" != "not_found" ] && [ "$KT_PROP_CODE" != "not_found" ]; then
            if [ "$CPP_PROP_CODE" != "$KT_PROP_CODE" ]; then
              echo "::error::Binder transaction code mismatch! C++=$CPP_PROP_CODE vs Kotlin=$KT_PROP_CODE"
              exit 1
            fi
          fi
          echo "✅ Binder transaction codes consistent"
